<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AB Creations</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        cursive: ['Great Vibes', 'cursive'],
                    },
                    colors: {
                        vanilla: '#FFFDF7',
                        cocoa: '#3E2723',
                        strawberry: '#FF6B81',
                        caramel: '#D4A373',
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
        }
        .bg-strawberry-pattern {
            background-color: #FF6B81;
            background-image: 
                radial-gradient(ellipse 2px 3px at 15px 20px, #fde68a 100%, transparent 0),
                radial-gradient(ellipse 2px 3px at 0px 0px, #fde68a 100%, transparent 0);
            background-size: 30px 40px;
        }
        /* Hide scrollbar for cart */
        .overflow-y-auto::-webkit-scrollbar {
            width: 6px;
        }
        .overflow-y-auto::-webkit-scrollbar-track {
            background: transparent;
        }
        .overflow-y-auto::-webkit-scrollbar-thumb {
            background-color: rgba(62, 39, 35, 0.2);
            border-radius: 10px;
        }
    </style>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Icons
        const ShoppingCart = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        );
        const X = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );
        const Plus = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        );
        const Minus = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/></svg>
        );
        const Trash2 = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
        );

        // --- Data ---
        const PRODUCTS = [
            {
                id: 'sampler-8',
                title: 'Strawberry Sampler Box (8-Count)',
                description: "Can’t decide on just one? Try them all. This beautifully packaged 8-count box features two of each of our signature handcrafted flavors: Cinnamon Toast, Oreo, Pink with Rose, and S'mores. It is the perfect assortment for sharing, gifting, or treating yourself to a little bit of everything.",
                price: 18.00,
                imageSeed: 'strawberry-sampler',
                imageUrl: 'https://i.imgur.com/hdr4id2.jpg',
            },
            {
                id: 'white-oreo-12',
                title: 'White Chocolate Oreo Box (12-Count)',
                description: "Our ultimate cookies-and-cream indulgence. A full dozen of our large, hand-selected strawberries deeply dipped in velvety white chocolate and generously coated in crushed Oreo cookies. A guaranteed crowd-pleaser for any event or special occasion.",
                price: 45.00,
                imageSeed: 'white-chocolate-oreo',
                imageUrl: 'https://i.imgur.com/GOfnpg2.jpg',
            },
            {
                id: 'cinnamon-toast-12',
                title: 'Cinnamon Toast (12-Count)',
                description: "Comfort in every bite. A full dozen of our fresh strawberries dipped in smooth, sweet white chocolate and generously dusted with a crunchy, spiced cinnamon-sugar crumble. It tastes just like a cozy Sunday morning.",
                price: 45.00,
                imageSeed: 'cinnamon-toast-strawberry',
                imageUrl: 'https://i.imgur.com/cNEFI3S.jpg',
            },
            {
                id: 'oreo-12',
                title: 'Oreo (12-Count)',
                description: "A classic favorite elevated. A full dozen ripe strawberries covered in rich milk chocolate and rolled in a thick layer of crushed Oreo cookies, delivering the perfect balance of fresh fruit and chocolatey crunch.",
                price: 45.00,
                imageSeed: 'oreo-strawberry',
                imageUrl: 'https://i.imgur.com/VBMtDBt.jpg',
            },
            {
                id: 'pink-rose-12',
                title: 'Pink with Rose (12-Count)',
                description: "Elegant and sophisticated. A full dozen berries hand-dipped in a delicate pink-tinted chocolate and finished with a beautiful drizzle and a sprinkle of edible rose petals. Almost too pretty to eat.",
                price: 45.00,
                imageSeed: 'pink-rose-strawberry',
                imageUrl: 'https://i.imgur.com/ksCzu3j.jpg',
            },
            {
                id: 'smores-12',
                title: "S'mores (12-Count)",
                description: "Bring the campfire home. A full dozen of our sweetest strawberries coated in smooth milk chocolate, rolled in crushed graham crackers, and finished off with a perfect marshmallow drizzle.",
                price: 45.00,
                imageSeed: 'smores-strawberry',
                imageUrl: 'https://i.imgur.com/R58nHBT.jpg',
            },
        ];

        function ProductCard({ product, onAdd }) {
            const [quantity, setQuantity] = useState(1);

            return (
                <div className="bg-black rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow duration-300 border border-white/10 flex flex-col">
                    <div className="aspect-[4/3] overflow-hidden bg-zinc-900 relative group">
                        <img
                            src={product.imageUrl || `https://picsum.photos/seed/${product.imageSeed}/800/600?blur=2`}
                            alt={product.title}
                            className="w-full h-full object-cover"
                            referrerPolicy="no-referrer"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent mix-blend-multiply" />
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                        <div className="flex justify-between items-start mb-4">
                            <h3 className="text-xl font-semibold text-white leading-tight">{product.title}</h3>
                            <span className="text-lg font-bold text-strawberry ml-4">${product.price.toFixed(2)}</span>
                        </div>
                        <div className="bg-white p-4 rounded-2xl mb-6 flex-grow shadow-sm">
                            <p className="text-cocoa/90 text-sm leading-relaxed">
                                {product.description}
                            </p>
                        </div>
                        <div className="flex items-center gap-3 mt-auto">
                            <div className="flex items-center bg-white rounded-xl border border-cocoa/10 h-12">
                                <button
                                    onClick={() => setQuantity(Math.max(1, quantity - 1))}
                                    className="px-3 text-cocoa/60 hover:text-strawberry h-full flex items-center justify-center transition-colors"
                                    aria-label="Decrease quantity"
                                >
                                    <Minus className="w-4 h-4" />
                                </button>
                                <span className="w-8 text-center font-medium text-cocoa">{quantity}</span>
                                <button
                                    onClick={() => setQuantity(quantity + 1)}
                                    className="px-3 text-cocoa/60 hover:text-strawberry h-full flex items-center justify-center transition-colors"
                                    aria-label="Increase quantity"
                                >
                                    <Plus className="w-4 h-4" />
                                </button>
                            </div>
                            <button
                                onClick={() => {
                                    onAdd(product, quantity);
                                    setQuantity(1);
                                }}
                                className="flex-1 h-12 bg-strawberry hover:bg-strawberry/90 text-white font-medium rounded-xl transition-colors duration-200 shadow-sm"
                            >
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [products, setProducts] = useState(PRODUCTS);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            
            // Form State
            const [fullName, setFullName] = useState('');
            const [email, setEmail] = useState('');
            const [phone, setPhone] = useState('');
            const [pickupDate, setPickupDate] = useState('');
            const [notes, setNotes] = useState('');

            // --- Cart Logic ---
            const addToCart = (product, quantityToAdd = 1) => {
                setCart((prev) => {
                    const existing = prev.find((item) => item.product.id === product.id);
                    if (existing) {
                        return prev.map((item) =>
                            item.product.id === product.id
                                ? { ...item, quantity: item.quantity + quantityToAdd }
                                : item
                        );
                    }
                    return [...prev, { product, quantity: quantityToAdd }];
                });
                setIsCartOpen(true);
            };

            const updateQuantity = (productId, delta) => {
                setCart((prev) =>
                    prev.map((item) => {
                        if (item.product.id === productId) {
                            const newQuantity = Math.max(0, item.quantity + delta);
                            return { ...item, quantity: newQuantity };
                        }
                        return item;
                    }).filter((item) => item.quantity > 0)
                );
            };

            const removeFromCart = (productId) => {
                setCart((prev) => prev.filter((item) => item.product.id !== productId));
            };

            const cartTotal = useMemo(() => {
                return cart.reduce((total, item) => total + item.product.price * item.quantity, 0);
            }, [cart]);

            const cartItemCount = useMemo(() => {
                return cart.reduce((count, item) => count + item.quantity, 0);
            }, [cart]);

            // --- Submission Logic ---
            const handleSubmitOrder = (e) => {
                e.preventDefault();
                
                if (cart.length === 0) {
                    alert("Your cart is empty!");
                    return;
                }

                let orderDetails = `New Order Request from ${fullName}\n`;
                orderDetails += `Email: ${email}\n`;
                orderDetails += `Phone: ${phone}\n`;
                orderDetails += `Requested Pickup: ${pickupDate}\n\n`;
                orderDetails += `--- ORDER DETAILS ---\n`;
                
                cart.forEach((item) => {
                    orderDetails += `${item.quantity}x ${item.product.title} - $${(item.product.price * item.quantity).toFixed(2)}\n`;
                });
                
                orderDetails += `\nTOTAL CASH DUE: $${cartTotal.toFixed(2)}\n\n`;
                
                if (notes) {
                    orderDetails += `--- SPECIAL NOTES ---\n${notes}\n`;
                }

                const subject = encodeURIComponent(`New Order Request: ${fullName}`);
                const body = encodeURIComponent(orderDetails);
                const mailtoLink = `mailto:apriljenkins1988@yahoo.com?subject=${subject}&body=${body}`;
                
                window.location.href = mailtoLink;
            };

            return (
                <div className="min-h-screen font-sans flex flex-col">
                    {/* --- Header --- */}
                    <header className="sticky top-0 z-40 bg-strawberry-pattern shadow-md border-b border-cocoa/10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between relative">
                            {/* Spacer to balance the flex layout */}
                            <div className="w-12 sm:w-16"></div>

                            {/* Centered Logo Design */}
                            <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center w-max z-10">
                                <img 
                                    src="https://i.imgur.com/XYOiEai.png" 
                                    alt="AB Creations Logo" 
                                    className="h-16 md:h-20 w-auto object-contain drop-shadow-md"
                                    referrerPolicy="no-referrer"
                                />
                            </div>

                            <div className="bg-white p-1 rounded-2xl shadow-sm relative z-20">
                                <button
                                    onClick={() => setIsCartOpen(true)}
                                    className="relative p-3 text-cocoa hover:text-strawberry transition-colors duration-200 rounded-xl"
                                    aria-label="Open cart"
                                >
                                    <ShoppingCart className="w-6 h-6" />
                                    {cartItemCount > 0 && (
                                        <span className="absolute -top-2 -right-2 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-vanilla bg-cocoa rounded-full shadow-sm">
                                            {cartItemCount}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* --- Main Content --- */}
                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                        <div className="text-center mb-16 flex flex-col items-center">
                            <div className="bg-white px-8 py-4 rounded-2xl shadow-sm inline-block mb-6 relative">
                                <span className="absolute -top-4 -left-4 text-3xl drop-shadow-sm -rotate-45">🍓</span>
                                <span className="absolute -top-4 -right-4 text-3xl drop-shadow-sm rotate-45">🍓</span>
                                <span className="absolute -bottom-4 -left-4 text-3xl drop-shadow-sm -rotate-[135deg]">🍓</span>
                                <span className="absolute -bottom-4 -right-4 text-3xl drop-shadow-sm rotate-[135deg]">🍓</span>
                                <h2 className="font-cursive text-4xl md:text-5xl text-strawberry tracking-wide leading-none pt-1">
                                    Gourmet Chocolate-Covered Strawberries
                                </h2>
                            </div>
                            <p className="text-white/80 max-w-2xl mx-auto text-lg">
                                Handcrafted with love, perfect for any occasion. Treat yourself or someone special to our artisanal dessert boxes.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                            {products.map((product) => (
                                <ProductCard key={product.id} product={product} onAdd={addToCart} />
                            ))}
                        </div>
                    </main>

                    {/* --- Footer --- */}
                    <footer className="bg-strawberry-pattern py-8 border-t border-cocoa/10 flex flex-col items-center justify-center">
                        <div className="bg-white px-8 py-4 rounded-2xl shadow-sm inline-flex flex-col items-center text-center relative">
                            <span className="absolute -top-3 -left-3 text-2xl drop-shadow-sm -rotate-45">🍓</span>
                            <span className="absolute -top-3 -right-3 text-2xl drop-shadow-sm rotate-45">🍓</span>
                            <span className="absolute -bottom-3 -left-3 text-2xl drop-shadow-sm -rotate-[135deg]">🍓</span>
                            <span className="absolute -bottom-3 -right-3 text-2xl drop-shadow-sm rotate-[135deg]">🍓</span>
                            <p className="font-cursive text-3xl mb-1 text-strawberry">AB Creations</p>
                            <p className="text-sm text-cocoa/80 font-medium">Handcrafted Gourmet Strawberries</p>
                        </div>
                    </footer>

                    {/* --- Cart Slide-out Panel --- */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 overflow-hidden">
                            <div className="absolute inset-0 bg-cocoa/40 backdrop-blur-sm transition-opacity" onClick={() => setIsCartOpen(false)} />
                            
                            <div className="fixed inset-y-0 right-0 max-w-md w-full flex">
                                <div className="w-full h-full bg-vanilla shadow-2xl flex flex-col animate-in slide-in-from-right duration-300">
                                    
                                    {/* Cart Header */}
                                    <div className="px-6 py-4 border-b border-cocoa/10 flex items-center justify-between bg-white">
                                        <h2 className="text-2xl font-semibold text-cocoa flex items-center gap-2">
                                            <ShoppingCart className="w-6 h-6 text-strawberry" />
                                            Your Order
                                        </h2>
                                        <button
                                            onClick={() => setIsCartOpen(false)}
                                            className="p-2 text-cocoa/50 hover:text-cocoa transition-colors rounded-full hover:bg-cocoa/5"
                                        >
                                            <X className="w-6 h-6" />
                                        </button>
                                    </div>

                                    {/* Cart Content (Scrollable) */}
                                    <div className="flex-1 overflow-y-auto flex flex-col">
                                        <div className="p-6 flex-1">
                                            {cart.length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-cocoa/50 space-y-4 min-h-[50vh]">
                                                    <ShoppingCart className="w-16 h-16 opacity-20" />
                                                    <p className="text-lg">Your cart is empty</p>
                                                    <button 
                                                        onClick={() => setIsCartOpen(false)}
                                                        className="text-strawberry font-medium hover:underline"
                                                    >
                                                        Continue Shopping
                                                    </button>
                                                </div>
                                            ) : (
                                                <div className="space-y-4">
                                                    {cart.map((item) => (
                                                        <div key={item.product.id} className="flex gap-4 bg-white p-4 rounded-xl shadow-sm border border-cocoa/5">
                                                            <img
                                                                src={item.product.imageUrl || `https://picsum.photos/seed/${item.product.imageSeed}/200/200?blur=2`}
                                                                alt={item.product.title}
                                                                className="w-20 h-20 object-cover rounded-lg"
                                                                referrerPolicy="no-referrer"
                                                            />
                                                            <div className="flex-1 flex flex-col justify-between">
                                                                <div>
                                                                    <h4 className="font-medium text-cocoa leading-tight pr-6">{item.product.title}</h4>
                                                                    <p className="text-caramel font-semibold mt-1">${item.product.price.toFixed(2)}</p>
                                                                </div>
                                                                <div className="flex items-center justify-between mt-2">
                                                                    <div className="flex items-center gap-3 bg-vanilla rounded-lg border border-cocoa/10 px-2 py-1">
                                                                        <button
                                                                            onClick={() => updateQuantity(item.product.id, -1)}
                                                                            className="text-cocoa/60 hover:text-strawberry transition-colors"
                                                                        >
                                                                            <Minus className="w-4 h-4" />
                                                                        </button>
                                                                        <span className="w-4 text-center text-sm font-medium text-cocoa">{item.quantity}</span>
                                                                        <button
                                                                            onClick={() => updateQuantity(item.product.id, 1)}
                                                                            className="text-cocoa/60 hover:text-strawberry transition-colors"
                                                                        >
                                                                            <Plus className="w-4 h-4" />
                                                                        </button>
                                                                    </div>
                                                                    <button
                                                                        onClick={() => removeFromCart(item.product.id)}
                                                                        className="text-cocoa/40 hover:text-red-500 transition-colors p-1"
                                                                        aria-label="Remove item"
                                                                    >
                                                                        <Trash2 className="w-4 h-4" />
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {/* Checkout Section */}
                                        {cart.length > 0 && (
                                            <div className="border-t border-cocoa/10 bg-white p-6 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] mt-auto">
                                                <div className="flex justify-between items-center mb-4">
                                                    <span className="text-lg text-cocoa/70">Total Cash Due</span>
                                                    <span className="text-2xl font-bold text-cocoa">${cartTotal.toFixed(2)}</span>
                                                </div>

                                                <form onSubmit={handleSubmitOrder} className="space-y-3">
                                                    <div>
                                                        <input
                                                            type="text"
                                                            required
                                                            placeholder="Full Name"
                                                            value={fullName}
                                                            onChange={(e) => setFullName(e.target.value)}
                                                            className="w-full px-4 py-2.5 rounded-xl border border-cocoa/20 bg-vanilla/50 focus:bg-white focus:ring-2 focus:ring-strawberry/50 focus:border-strawberry outline-none transition-all text-cocoa placeholder:text-cocoa/40"
                                                        />
                                                    </div>
                                                    <div>
                                                        <input
                                                            type="email"
                                                            required
                                                            placeholder="Email Address"
                                                            value={email}
                                                            onChange={(e) => setEmail(e.target.value)}
                                                            className="w-full px-4 py-2.5 rounded-xl border border-cocoa/20 bg-vanilla/50 focus:bg-white focus:ring-2 focus:ring-strawberry/50 focus:border-strawberry outline-none transition-all text-cocoa placeholder:text-cocoa/40"
                                                        />
                                                    </div>
                                                    <div>
                                                        <input
                                                            type="tel"
                                                            required
                                                            placeholder="Phone Number"
                                                            value={phone}
                                                            onChange={(e) => setPhone(e.target.value)}
                                                            className="w-full px-4 py-2.5 rounded-xl border border-cocoa/20 bg-vanilla/50 focus:bg-white focus:ring-2 focus:ring-strawberry/50 focus:border-strawberry outline-none transition-all text-cocoa placeholder:text-cocoa/40"
                                                        />
                                                    </div>
                                                    <div>
                                                        <input
                                                            type="datetime-local"
                                                            required
                                                            value={pickupDate}
                                                            onChange={(e) => setPickupDate(e.target.value)}
                                                            className="w-full px-4 py-2.5 rounded-xl border border-cocoa/20 bg-vanilla/50 focus:bg-white focus:ring-2 focus:ring-strawberry/50 focus:border-strawberry outline-none transition-all text-cocoa"
                                                        />
                                                    </div>
                                                    <div>
                                                        <textarea
                                                            placeholder="Special Notes (Optional)"
                                                            value={notes}
                                                            onChange={(e) => setNotes(e.target.value)}
                                                            rows={2}
                                                            className="w-full px-4 py-2.5 rounded-xl border border-cocoa/20 bg-vanilla/50 focus:bg-white focus:ring-2 focus:ring-strawberry/50 focus:border-strawberry outline-none transition-all text-cocoa placeholder:text-cocoa/40 resize-none"
                                                        />
                                                    </div>
                                                    <button
                                                        type="submit"
                                                        className="w-full py-3.5 bg-strawberry hover:bg-strawberry/90 text-white font-semibold rounded-xl transition-colors duration-200 shadow-md flex justify-center items-center gap-2 text-lg mt-2"
                                                    >
                                                        Submit Order Request
                                                    </button>
                                                    <p className="text-xs text-center text-cocoa/50 mt-2">
                                                        Payment is cash only upon pickup. Submitting this form will open your email client to send the request.
                                                    </p>
                                                </form>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
